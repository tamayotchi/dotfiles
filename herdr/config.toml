# herdr configuration
# Place at ~/.config/herdr/config.toml (or symlink from dotfiles)

[keys]
prefix = "backtick"

reload_config = "prefix+q"

zoom = "prefix+f"

# Split panes
split_vertical = "prefix+|"
split_horizontal = "prefix+-"

# Workspace
new_workspace = "prefix+t"
close_workspace = "prefix+shift+x"

# Tabs
close_tab = "prefix+X"
rename_tab = "prefix+R"

# Workspace navigation
navigate_workspace_up = "k"
navigate_workspace_down = "j"

# Pane navigation — add direct ctrl+hjkl (tmux: bind-key -n C-h/j/k/l select-pane)
focus_pane_left = ["prefix+h", "ctrl+h"]
focus_pane_down = ["prefix+j", "ctrl+j"]
focus_pane_up = ["prefix+k", "ctrl+k"]
focus_pane_right = ["prefix+l", "ctrl+l"]

[ui]
prompt_new_tab_name = false
agent_panel_sort = "priority"
